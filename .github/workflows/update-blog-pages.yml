name: Update Blog Pages

on:
  push:
    paths:
      - 'mdposts/blog/**'
  workflow_dispatch:  # 수동 트리거 가능하도록 추가

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install markdown # 필요한 패키지들 설치

    - name: Update Blog Pages
      run: |
        python assets/py/update-blog-page.py  # Blog 페이지 업데이트 스크립트 실행

    - name: Update Index Page
      run: |
        python assets/py/update-index-page.py  # 공통 인덱스 업데이트 스크립트 실행

    - name: Commit changes
      run: |
        git config --local user.email "your-email@example.com"
        git config --local user.name "GitHub Actions"
        git add blog/ index.html
        git commit -m "Auto-update blog pages and index"
        git push
