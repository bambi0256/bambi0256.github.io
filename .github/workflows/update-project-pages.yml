name: Update Project Pages

on:
  push:
    paths:
      - 'projectsmd/**.md'  # projectsmd 폴더 내의 md 파일들만 변경 시 반영

jobs:
  update-project-pages:
    runs-on: ubuntu-latest
    steps:
      # 1. 레포지토리 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Python 환경 설정
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # 3. 의존성 설치 (pyyaml, jinja2 등)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jinja2

      # 4. Python 스크립트 실행 (프로젝트 포스트 HTML 생성, index.html 갱신)
      - name: Generate project HTML and update index.html
        run: |
          python assets/py/generate-posts-projects.py  # projects 포스트 HTML 생성
          python assets/py/generate-index.py  # index.html 갱신

      # 5. 변경 사항 커밋 및 푸시
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add projects/**.html index.html
          git commit -m "Update project posts and index page"
          git push
