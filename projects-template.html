<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <!-- Header Section -->
    <header>
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </nav>
    </header>

    <!-- Projects Section -->
    <main>
        <section id="projects">
            <h2>Latest Projects</h2>
            <div class="post-grid">
                {% for post in project_posts %}
                <div class="post-card">
                    <a href="projects/{{ post.slug }}.html">
                        <img src="{{ post.image }}" alt="{{ post.title }}">
                        <div class="post-details">
                            <h3>{{ post.title }}</h3>
                            <p class="post-date">Completed on {{ post.date }}</p>
                            <p class="post-tags">
                                <span class="tag">{{ post.tag }}</span> <!-- Only one tag for projects -->
                            </p>
                        </div>
                    </a>
                </div>
                {% endfor %}
            </div>
        </section>
    </main>

    <!-- Footer Section -->
    <footer>
        <p>© 2024 Your Name</p>
    </footer>
</body>
</html>
